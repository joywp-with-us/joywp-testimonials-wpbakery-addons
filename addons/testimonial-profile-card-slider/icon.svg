<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="32px" height="32px" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <title>testimonial_profile_card_slider_wrapper</title>

    <g fill="none" fill-rule="evenodd">

        <!-- Background -->
        <rect x="0" y="0" width="32" height="32" rx="5" fill="#FFFFFF"></rect>

        <!-- Main card (expanded to reduce side gaps) -->
        <rect x="2" y="5" width="28" height="18" rx="3" fill="#F2F2F2"></rect>

        <!-- Image block on right (slightly wider) -->
        <rect x="18" y="5" width="12" height="18" rx="3" fill="#87BBFE"></rect>

        <!-- Text lines (slightly wider) -->
        <rect x="4" y="8" width="12" height="1.5" rx="1" fill="#D1D1D1"></rect>
        <rect x="4" y="11" width="12" height="1.5" rx="1" fill="#D1D1D1"></rect>
        <rect x="4" y="14" width="10" height="1.5" rx="1" fill="#D1D1D1"></rect>

        <!-- Name line -->
        <rect x="4" y="17" width="7" height="1.5" rx="1" fill="#4A4A4A"></rect>

        <!-- Slider dots (bigger) -->
        <circle cx="12" cy="27" r="1.8" fill="#D1D1D1"></circle>
        <circle cx="16" cy="27" r="1.8" fill="#87BBFE"></circle>
        <circle cx="20" cy="27" r="1.8" fill="#D1D1D1"></circle>

        <!-- Accent marker -->
        <circle cx="25" cy="10" r="2" fill="#F6A4EC"></circle>

    </g>
</svg>