<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="32px" height="32px" viewBox="0 0 32 32" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
    <title>joywp-testimonial-quote-with-avatar</title>
    <desc>Quote block with pointer and larger left-aligned colorful avatar</desc>

    <g fill="none" fill-rule="evenodd">
        <!-- Background -->
        <rect x="0" y="0" width="32" height="32" rx="5" fill="#FFFFFF"></rect>

        <!-- Quote card (top, slightly right) -->
        <rect x="7" y="2" width="20" height="11" rx="2"
              stroke="#4A90E2" stroke-width="1.5" fill="none"></rect>

        <!-- Quote marks -->
        <path d="M10.2,5
             c0,-0.9 0.7,-1.6 1.6,-1.6
             h0.9 v1.2 h-0.6
             c-0.4,0 -0.6,0.3 -0.6,0.6
             v0.5 h1.2 v1.5 h-2.5 z"
              fill="#F6A4EC"></path>

        <path d="M20.8,5
             c0,-0.9 0.7,-1.6 1.6,-1.6
             h0.9 v1.2 h-0.6
             c-0.4,0 -0.6,0.3 -0.6,0.6
             v0.5 h1.2 v1.5 h-2.5 z"
              fill="#AFF1B6"></path>

        <!-- Quote text lines -->
        <rect x="10" y="8" width="14" height="1" rx="1" fill="#D1D1D1"></rect>
        <rect x="10" y="10.5" width="12" height="1" rx="1" fill="#D1D1D1"></rect>

        <!-- Triangular pointer -->
        <polygon points="11,13 15,13 12,16" fill="#FFFFFF"></polygon>
        <polygon points="11,13 15,13 12,16"
                 fill="none" stroke="#4A90E2" stroke-width="1.5"
                 stroke-linejoin="round"></polygon>

        <!-- Avatar base (bigger + moved left) -->
        <circle cx="8.5" cy="24.5" r="5.2" fill="#FFD166"></circle>
        <circle cx="8.5" cy="24.5" r="4.6" fill="#87BBFE"></circle>

        <!-- Decorative dots -->
        <circle cx="6.3" cy="23.2" r="0.6" fill="#F6A4EC"></circle>
        <circle cx="10.4" cy="23.0" r="0.5" fill="#AFF1B6"></circle>
        <circle cx="10.0" cy="26.3" r="0.5" fill="#FF8C42"></circle>
        <circle cx="6.8" cy="26.6" r="0.5" fill="#B388FF"></circle>

        <!-- Person glyph -->
        <circle cx="8.5" cy="22.8" r="1.3" fill="#FFFFFF"></circle>
        <path d="M5.4,27.8
             c0.7,-1.9 2.2,-3.1 3.1,-3.1
             c0.9,0 2.4,1.2 3.1,3.1
             c-0.9,0.6 -2.0,0.9 -3.1,0.9
             c-1.1,0 -2.2,-0.3 -3.1,-0.9 z"
              fill="#FFFFFF" opacity="0.95"></path>
    </g>
</svg>
