<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="32px" height="32px" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <title>sticker-testimonial</title>

    <g fill="none" fill-rule="evenodd">

        <!-- Background -->
        <rect x="0" y="0" width="32" height="32" rx="5" fill="#FFFFFF"></rect>

        <!-- Speech bubble frame -->
        <rect x="4" y="6" width="24" height="16" rx="3"
              stroke="#4A90E2" stroke-width="1.5"></rect>

        <!-- Bubble tail -->
        <polygon points="10,22 14,22 10,26" fill="#4A90E2"></polygon>

        <!-- Sticker testimonial area -->
        <rect x="6" y="8" width="20" height="8" rx="1.5" fill="#F6C15A"></rect>

        <!-- Text lines -->
        <rect x="7" y="10" width="10" height="1" fill="#D1D1D1" rx="1"></rect>
        <rect x="7" y="12" width="8" height="1" fill="#D1D1D1" rx="1"></rect>

        <!-- Source line -->
        <rect x="16" y="18" width="8" height="1" fill="#D1D1D1" rx="1"></rect>

        <!-- Small photo/sticker preview -->
        <rect x="21" y="9" width="5" height="5" rx="0.8"
              fill="#FFFFFF" stroke="#D1D1D1"></rect>

        <!-- Paperclip hint -->
        <path d="M24 8.5
             c1 0 1.5 0.8 1.5 1.5
             v3
             c0 1 -0.7 1.5 -1.5 1.5
             s-1.5 -0.5 -1.5 -1.5
             v-2.5"
              stroke="#4A90E2"
              stroke-width="0.8"
              fill="none"
              stroke-linecap="round"/>

    </g>
</svg>
