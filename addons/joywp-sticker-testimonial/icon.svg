<svg width="32" height="32" viewBox="0 0 32 32"
     xmlns="http://www.w3.org/2000/svg">
    <title>interactive-shuffling-testimonials</title>

    <g fill="none" fill-rule="evenodd">

        <!-- Background -->
        <rect x="0" y="0" width="32" height="32" rx="5" fill="#FFFFFF"/>

        <!-- Cards -->
        <g transform="translate(2 6) rotate(-5)">
            <rect x="0" y="0" width="14" height="11" rx="2" fill="#F6A4EC"/>
            <rect x="2" y="4" width="9" height="1" rx="1" fill="#FFFFFF"/>
        </g>

        <g transform="translate(14 3) rotate(4)">
            <rect x="0" y="0" width="15" height="11" rx="2" fill="#87BBFE"/>
            <rect x="2" y="4" width="10" height="1" rx="1" fill="#FFFFFF"/>
        </g>

        <g transform="translate(5 14) rotate(2)">
            <rect x="0" y="0" width="16" height="12" rx="2" fill="#AFF1B6"/>
            <rect x="2" y="4" width="11" height="1" rx="1" fill="#FFFFFF"/>
            <rect x="2" y="6" width="8" height="1" rx="1" fill="#FFFFFF"/>
        </g>

        <g transform="translate(18 15) rotate(-4)">
            <rect x="0" y="0" width="12" height="10" rx="2" fill="#FFD700"/>
            <rect x="2" y="4" width="7" height="1" rx="1" fill="#FFFFFF"/>
        </g>

        <!-- Firework dots (mostly edges) -->
        <!-- Top -->
        <circle cx="4" cy="3" r="1" fill="#F6A4EC" opacity="0.85"/>
        <circle cx="10" cy="2" r="0.9" fill="#87BBFE" opacity="0.85"/>
        <circle cx="18" cy="2" r="1" fill="#AFF1B6" opacity="0.85"/>
        <circle cx="26" cy="3" r="0.9" fill="#FFD700" opacity="0.85"/>

        <!-- Left -->
        <circle cx="2" cy="9" r="0.9" fill="#87BBFE" opacity="0.85"/>
        <circle cx="3" cy="18" r="1" fill="#F6A4EC" opacity="0.85"/>
        <circle cx="2" cy="26" r="0.9" fill="#AFF1B6" opacity="0.85"/>

        <!-- Right -->
        <circle cx="30" cy="8" r="1" fill="#FFD700" opacity="0.85"/>
        <circle cx="29" cy="17" r="0.9" fill="#87BBFE" opacity="0.85"/>
        <circle cx="30" cy="26" r="1" fill="#F6A4EC" opacity="0.85"/>

        <!-- Bottom -->
        <circle cx="6" cy="30" r="0.9" fill="#AFF1B6" opacity="0.85"/>
        <circle cx="14" cy="29" r="1" fill="#87BBFE" opacity="0.85"/>
        <circle cx="22" cy="30" r="0.9" fill="#FFD700" opacity="0.85"/>

    </g>
</svg>
